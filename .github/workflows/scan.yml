name: scanners

# Serverlos auf GitHub (auch wenn dein PC aus ist), getriggert via cron-job.org
# (workflow_dispatch alle 5 Min) + GitHub-Cron als Notnagel.
#
# Architektur: Die SEITE wird per GitHub-Pages-ARTEFAKT deployt (nie ins Git committet
# -> keine Historie-Bloat) und ist bei jedem Lauf frisch. Ins Repo committen wir NUR
# die persistenten Daten (Forward-Track-CSVs + Alert-State), und auch die nur bei
# echter Listen-Aenderung. Aktien-Scan ist intern auf das US-Marktfenster gegated.
on:
  schedule:
    - cron: "*/15 * * * *"      # Backstop alle 15 Min (best-effort) -> cron-job.org ist primaer (5 Min)
  workflow_dispatch: {}

permissions:
  contents: write              # Daten-Commit (CSV + Alert-State)
  pages: write                 # Pages-Artefakt deployen
  id-token: write              # OIDC fuer deploy-pages

concurrency:
  group: scanners
  cancel-in-progress: true     # haengende Deploys (Pages-Env-Wait) sofort abloesen statt Stau/Cancel-
                               # Kaskade. Safe: Seite kommt via Artefakt, Daten-Commit ist unkritisch.

jobs:
  build:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Dependencies
        run: pip install -r requirements.txt

      - name: Scanner ausfuehren + Seite bauen
        env:
          TVREMIX_API_KEY: ${{ secrets.TVREMIX_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          CRYPTO_EXCHANGE: gate,mexc,bybit
          # gate-gerechte Schwellen (kleineres Perp-Universum als Binance).
          VOL_FLOOR: "3000000"
          CHG_MIN: "3"
          RVOL_MIN: "2"
          # Seite ist via Artefakt immer frisch -> Wert-Drift-Commit nicht noetig.
          # Daten nur bei Set-Aenderung committen (PCT-Schwelle praktisch aus) + 6h-Heartbeat.
          ALERT_PCT_THRESH: "999999"
          HEARTBEAT_MIN: "360"
        run: python build_site.py

      # --- Seite IMMER frisch via Pages-Artefakt (kein Git -> keine Historie-Bloat) ---
      - name: Pages-Artefakt hochladen
        uses: actions/upload-pages-artifact@v3
        continue-on-error: true       # Deploy-Hiccup darf den Lauf nicht failen (keine Mail)
        with:
          path: docs

      - name: Pages deployen
        id: deploy
        uses: actions/deploy-pages@v4
        continue-on-error: true

      # --- Daten (CSV + Alert-State) NUR bei echter Aenderung committen, NICHT die Seite ---
      - name: Daten committen
        continue-on-error: true       # unkritisch: Deploy lief schon via Artefakt -> nie Fail-Mail
        run: |
          if [ ! -f .do_commit ]; then echo "keine Aenderung -> kein Commit"; exit 0; fi
          rm -f .do_commit
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          MSG="data $(date -u +'%Y-%m-%d %H:%M UTC')"
          git add stock_scan_log.csv crypto_scan_log.csv alert_state_crypto.json alert_state_stock.json 2>/dev/null || true
          git diff --quiet --cached && { echo "nichts zu committen"; exit 0; }
          git commit -m "$MSG"
          # Konfliktfest pushen: bei Ablehnung unsere Daten LINEAR auf frisches origin/main neu
          # aufsetzen (reset --soft haelt unsere Aenderungen gestaged) -> kein Rebase-Konflikt moeglich.
          for i in 1 2 3 4 5; do
            if git push; then echo "push ok"; exit 0; fi
            echo "push abgelehnt -> auf origin/main neu aufsetzen ($i)"
            git fetch origin main || true
            git reset --soft origin/main || true
            git diff --quiet --cached || git commit -m "$MSG"
            sleep 2
          done
          echo "push nach 5 Versuchen weiter fehlgeschlagen (unkritisch -> kein Fail)"; exit 0
