name: scanners

# Laeuft serverlos auf GitHub (auch wenn dein PC aus ist). Zeiten in UTC.
# Haeufiger Takt fuer Push-Alarme bei NEUEN Eintraegen (Telegram). GitHub-Cron ist
# best-effort (kann 5-20 Min verspaeten) -> "nah dran", nicht echtzeit. Public-Repo =
# unbegrenzte Action-Minuten. Aktien-Scan ist intern auf das US-Marktfenster
# (08-21 UTC Mo-Fr) gegated; Krypto laeuft bei jedem Lauf 24/7.
on:
  schedule:
    - cron: "*/5 * * * *"       # alle 5 Min (GitHub-Minimum; best-effort -> real eher 5-20 Min)
  workflow_dispatch: {}         # manuell aus der GitHub-App ("Run workflow")

permissions:
  contents: write            # erlaubt den Commit der Ergebnisse zurueck ins Repo

concurrency:
  group: scanners
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Dependencies
        run: pip install -r requirements.txt

      - name: Scanner ausfuehren + Seite bauen
        env:
          TVREMIX_API_KEY: ${{ secrets.TVREMIX_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          CRYPTO_EXCHANGE: gate,mexc,bybit
          # gate-gerechte Schwellen: gate hat ein kleineres Perp-Universum mit kleineren
          # Coin-Volumina als Binance. 10M/5%/2x liefert nur ~2 Treffer -> gelockert auf
          # 3M Vol-Floor / 3% Move / RVOL 2x (~10+ Treffer, $3M Floor haelt Micro-Caps raus).
          VOL_FLOOR: "3000000"
          CHG_MIN: "3"
          RVOL_MIN: "2"
        run: python build_site.py

      - name: Ergebnisse committen
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs stock_scan_log.csv crypto_scan_log.csv alert_state_crypto.json alert_state_stock.json 2>/dev/null || true
          git diff --quiet --cached || git commit -m "scan $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
